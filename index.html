<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anshu Runner | Pro Edition</title>
    
    <!-- EXTERNAL ASSETS (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            overflow: hidden;
            color: #1C1C1E;
        }

        canvas {
            display: block;
        }

        /* --- LOADING SCREEN --- */
        #loader-ui {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .progress-container {
            width: 80%;
            max-width: 300px;
            height: 6px;
            background: #E5E5EA;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--ios-blue);
            transition: width 0.3s ease;
        }

        #debug-log {
            margin-top: 20px;
            font-size: 10px;
            color: #8E8E93;
            font-family: monospace;
            max-height: 100px;
            overflow-y: auto;
            width: 100%;
            text-align: center;
        }

        /* --- UI GLASSMORPHISM --- */
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: var(--ios-blue);
            color: white;
            border-radius: 20px;
            padding: 18px 0;
            font-weight: 800;
            width: 100%;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* --- CHARACTER SHOP --- */
        .char-card {
            background: #F2F2F7;
            border-radius: 24px;
            padding: 15px;
            width: 100px;
            flex-shrink: 0;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .char-card.selected {
            border-color: var(--ios-blue);
            background: white;
        }

        /* --- SCREEN STATES --- */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            padding: 40px 20px;
        }

        .hidden { display: none !important; }

        #jump-btn {
            position: fixed;
            bottom: 40px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            border: 2px solid white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- 1. LOADER -->
    <div id="loader-ui">
        <h1 class="text-4xl font-black italic tracking-tighter">ANSHU RUNNER</h1>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p id="load-text" class="mt-4 font-bold text-gray-400 text-xs uppercase tracking-widest">Checking Files...</p>
        <div id="debug-log"></div>
        <button id="skip-btn" onclick="forceStart()" class="hidden mt-6 px-6 py-2 bg-gray-100 rounded-full text-xs font-bold uppercase">Skip & Play</button>
    </div>

    <!-- 2. MAIN MENU -->
    <div id="menu-screen" class="screen bg-white hidden">
        <div class="flex flex-col items-center flex-grow">
            <h1 class="text-6xl font-black italic mt-10">ANSHU<br><span class="text-blue-600">RUNNER</span></h1>
            <div class="mt-4 glass px-6 py-2 rounded-full font-bold text-sm">HIGH SCORE: <span id="high-score-ui">0</span></div>
            
            <!-- Character Selection -->
            <div class="w-full mt-auto mb-10 overflow-x-auto">
                <div class="flex gap-4 px-4 py-4">
                    <div onclick="selectChar(1)" id="card-1" class="char-card text-center clickable">
                        <div class="h-16 flex items-center justify-center text-4xl">🏃</div>
                        <p class="mt-2 text-[10px] font-bold">ANSHU</p>
                        <p class="text-[10px] text-blue-500 font-bold">FREE</p>
                    </div>
                    <div onclick="selectChar(2)" id="card-2" class="char-card text-center clickable relative">
                        <div id="lock-2" class="absolute top-1 right-1">🔒</div>
                        <div class="h-16 flex items-center justify-center text-4xl">🏄</div>
                        <p class="mt-2 text-[10px] font-bold">SURFER</p>
                        <p class="text-[10px] text-blue-500 font-bold">🪙 500</p>
                    </div>
                    <div onclick="selectChar(3)" id="card-3" class="char-card text-center clickable relative">
                        <div id="lock-3" class="absolute top-1 right-1">🔒</div>
                        <div class="h-16 flex items-center justify-center text-4xl">🤖</div>
                        <p class="mt-2 text-[10px] font-bold">BOT</p>
                        <p class="text-[10px] text-blue-500 font-bold">🪙 1000</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-center items-center gap-2 mb-4">
                <span class="text-2xl">🪙</span>
                <span id="total-coins-ui" class="text-2xl font-black">0</span>
            </div>
            <button onclick="startGame()" class="btn-primary">START RUNNING</button>
            <div class="flex gap-4">
                <button onclick="toggleFullscreen()" class="flex-1 py-4 bg-gray-100 rounded-2xl text-xs font-bold uppercase">Fullscreen</button>
                <button onclick="resetData()" class="flex-1 py-4 bg-gray-100 rounded-2xl text-xs font-bold uppercase text-red-500">Reset</button>
            </div>
        </div>
    </div>

    <!-- 3. HUD -->
    <div id="hud" class="fixed top-0 inset-x-0 p-6 flex justify-between items-start z-50 pointer-events-none hidden">
        <div class="glass px-6 py-3 rounded-3xl shadow-lg">
            <p class="text-[10px] font-black text-gray-400 uppercase leading-none">Score</p>
            <p id="score-val" class="text-3xl font-black text-gray-800 leading-none mt-1">0</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div class="glass px-5 py-3 rounded-2xl shadow-lg flex items-center gap-2">
                <span class="text-xl">🪙</span>
                <span id="session-coins" class="text-xl font-black">0</span>
            </div>
            <button onclick="pauseGame()" class="glass p-3 rounded-2xl pointer-events-auto">⏸️</button>
        </div>
    </div>

    <!-- 4. GAME OVER -->
    <div id="game-over" class="screen bg-white/95 hidden text-center justify-center">
        <h2 class="text-7xl font-black text-red-600 italic tracking-tighter mb-2">BUSTED!</h2>
        <p class="text-gray-400 font-bold uppercase tracking-widest mb-10">The police caught you</p>
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-gray-50 p-6 rounded-[30px]">
                <p class="text-xs font-bold text-gray-400 uppercase">Score</p>
                <p id="final-score" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-gray-50 p-6 rounded-[30px]">
                <p class="text-xs font-bold text-gray-400 uppercase">Coins</p>
                <p id="final-coins" class="text-3xl font-black">0</p>
            </div>
        </div>

        <button onclick="location.reload()" class="btn-primary mb-4">TRY AGAIN</button>
        <button onclick="location.reload()" class="w-full py-5 font-bold text-gray-400">EXIT TO MENU</button>
    </div>

    <div id="game-container"></div>

    <script>
        /**
         * GLOBAL CONFIG & STATE
         */
        const LANE_WIDTH = 4;
        const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
        const ASSET_PATH = "./"; // Root folder on GitHub

        let state = {
            coins: parseInt(localStorage.getItem('anshu_coins')) || 0,
            highScore: parseInt(localStorage.getItem('anshu_highScore')) || 0,
            unlocked: JSON.parse(localStorage.getItem('anshu_unlocked')) || [1],
            selected: parseInt(localStorage.getItem('anshu_selected')) || 1,
            isRunning: false,
            score: 0,
            sessionCoins: 0,
            currentLane: 1,
            speed: 0.5,
            isJumping: false,
            yVelocity: 0,
            isSliding: false
        };

        /**
         * THREE.JS CORE
         */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 7, 12);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        const worldGroup = new THREE.Group();
        const obstacleGroup = new THREE.Group();
        scene.add(worldGroup, obstacleGroup);

        /**
         * ASSET LOADER SYSTEM
         */
        const models = {};
        const manager = new THREE.LoadingManager();
        const loader = new THREE.GLTFLoader(manager);

        const filesToLoad = [
            { id: 'player1', file: 'player1.glb' },
            { id: 'player2', file: 'player2.glb' },
            { id: 'player3', file: 'player3.glb' },
            { id: 'police', file: 'police.glb' },
            { id: 'train', file: 'train.glb' },
            { id: 'coin', file: 'Coin.glb' }, // MATCHED CASE
            { id: 'building1', file: 'building1.glb' },
            { id: 'building2', file: 'building2.glb' },
            { id: 'track', file: 'track.glb' }
        ];

        const log = (msg) => {
            const el = document.getElementById('debug-log');
            el.innerHTML += `> ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        };

        manager.onStart = () => log("Starting loader...");
        manager.onProgress = (url, loaded, total) => {
            const progress = (loaded / total) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            log(`Loaded ${loaded}/${total}: ${url.split('/').pop()}`);
        };

        manager.onLoad = () => {
            log("All models loaded successfully!");
            setTimeout(initMenu, 1000);
        };

        manager.onError = (url) => {
            log(`ERROR LOADING: ${url}`);
            document.getElementById('skip-btn').classList.remove('hidden');
        };

        // Trigger loading
        filesToLoad.forEach(item => {
            loader.load(ASSET_PATH + item.file, 
                (gltf) => {
                    models[item.id] = gltf.scene;
                    models[item.id].traverse(n => { if(n.isMesh) n.castShadow = true; });
                },
                undefined,
                (err) => {
                    console.log("Creating fallback for " + item.id);
                    models[item.id] = createPlaceholder(item.id);
                }
            );
        });

        function createPlaceholder(id) {
            const group = new THREE.Group();
            let geo, mat;
            if(id.includes('player')) { geo = new THREE.BoxGeometry(1, 2, 1); mat = new THREE.MeshStandardMaterial({color: 0x007AFF}); }
            else if(id === 'coin') { geo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 16); mat = new THREE.MeshStandardMaterial({color: 0xFFD700}); group.rotation.x = Math.PI/2; }
            else if(id === 'train') { geo = new THREE.BoxGeometry(3, 4, 10); mat = new THREE.MeshStandardMaterial({color: 0xEE4444}); }
            else { geo = new THREE.BoxGeometry(2, 2, 2); mat = new THREE.MeshStandardMaterial({color: 0x888888}); }
            
            const mesh = new THREE.Mesh(geo, mat);
            if(id.includes('player')) mesh.position.y = 1;
            group.add(mesh);
            return group;
        }

        // Timer for unsticking
        setTimeout(() => {
            if(Object.keys(models).length < filesToLoad.length) {
                document.getElementById('skip-btn').classList.remove('hidden');
            }
        }, 5000);

        /**
         * GAME ENGINE
         */
        let playerObj, policeObj, mixer;
        const tiles = [];

        function initMenu() {
            document.getElementById('loader-ui').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            
            state.coins = parseInt(localStorage.getItem('anshu_coins')) || 0;
            state.highScore = parseInt(localStorage.getItem('anshu_highScore')) || 0;
            
            document.getElementById('total-coins-ui').innerText = state.coins;
            document.getElementById('high-score-ui').innerText = state.highScore;
            
            updateShopUI();
            setupScene();
        }

        function forceStart() {
            log("Force starting...");
            filesToLoad.forEach(f => {
                if(!models[f.id]) models[f.id] = createPlaceholder(f.id);
            });
            initMenu();
        }

        function setupScene() {
            // Player
            if(playerObj) scene.remove(playerObj);
            playerObj = new THREE.Group();
            const skin = (models[`player${state.selected}`] || createPlaceholder('player')).clone();
            playerObj.add(skin);
            playerObj.position.set(0, 0, 0);
            scene.add(playerObj);

            // Police
            if(policeObj) scene.remove(policeObj);
            policeObj = (models['police'] || createPlaceholder('police')).clone();
            policeObj.position.set(0, 0, 8);
            scene.add(policeObj);

            // Infinite Tiles
            while(worldGroup.children.length > 0) worldGroup.remove(worldGroup.children[0]);
            tiles.length = 0;
            for(let i=0; i<10; i++) {
                createTile(i * -20);
            }
        }

        function createTile(z) {
            const tile = new THREE.Group();
            
            // Road/Track
            if(models['track']) {
                tile.add(models['track'].clone());
            } else {
                const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 20), new THREE.MeshStandardMaterial({color: 0x333333}));
                road.rotation.x = -Math.PI/2;
                road.receiveShadow = true;
                tile.add(road);
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 20), new THREE.MeshStandardMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI/2;
                line.position.y = 0.01;
                tile.add(line);
            }

            // Buildings
            if(models['building1'] && Math.random() > 0.4) {
                const bLeft = models[Math.random() > 0.5 ? 'building1' : 'building2'].clone();
                bLeft.position.set(-10, 0, 0);
                bLeft.scale.set(1.5, 1 + Math.random(), 1.5);
                tile.add(bLeft);

                const bRight = models[Math.random() > 0.5 ? 'building1' : 'building2'].clone();
                bRight.position.set(10, 0, 0);
                bRight.scale.set(1.5, 1 + Math.random(), 1.5);
                tile.add(bRight);
            }

            tile.position.z = z;
            worldGroup.add(tile);
            tiles.push(tile);
        }

        function spawnObstacles(z) {
            const lane = LANES[Math.floor(Math.random() * 3)];
            const type = Math.random();

            if(type > 0.4) {
                // Spawn Train
                const train = (models['train'] || createPlaceholder('train')).clone();
                train.position.set(lane, 0, z);
                train.userData = { type: 'obstacle' };
                obstacleGroup.add(train);
            } else {
                // Spawn Coin Row
                for(let i=0; i<3; i++) {
                    const coin = (models['coin'] || createPlaceholder('coin')).clone();
                    coin.position.set(lane, 1.5, z - (i * 3));
                    coin.userData = { type: 'coin' };
                    obstacleGroup.add(coin);
                }
            }
        }

        /**
         * GAME LOOP
         */
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(state.isRunning) {
                state.speed += 0.0001;
                state.score += 1;
                document.getElementById('score-val').innerText = Math.floor(state.score/10);

                // Move Tiles
                tiles.forEach(tile => {
                    tile.position.z += state.speed;
                    if(tile.position.z > 25) {
                        tile.position.z -= 200;
                        spawnObstacles(tile.position.z);
                    }
                });

                // Move & Check Obstacles
                obstacleGroup.children.forEach((obj, idx) => {
                    obj.position.z += state.speed;
                    
                    if(obj.userData.type === 'coin') obj.rotation.y += 0.05;

                    // Collision (Simple distance check)
                    const dX = Math.abs(obj.position.x - playerObj.position.x);
                    const dZ = Math.abs(obj.position.z - playerObj.position.z);
                    const dY = Math.abs(obj.position.y - playerObj.position.y);

                    if(dX < 1.5 && dZ < 2 && dY < 2) {
                        if(obj.userData.type === 'coin') {
                            state.sessionCoins++;
                            state.coins++;
                            document.getElementById('session-coins').innerText = state.sessionCoins;
                            obstacleGroup.remove(obj);
                        } else {
                            gameOver();
                        }
                    }

                    if(obj.position.z > 20) obstacleGroup.remove(obj);
                });

                // Player Lane Movement
                const targetX = LANES[state.currentLane];
                playerObj.position.x = THREE.MathUtils.lerp(playerObj.position.x, targetX, 0.15);

                // Jump Physics
                if(state.isJumping) {
                    playerObj.position.y += state.yVelocity;
                    state.yVelocity -= 0.02;
                    if(playerObj.position.y <= 0) {
                        playerObj.position.y = 0;
                        state.isJumping = false;
                    }
                }

                // Camera Tilt & Follow
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, playerObj.position.x * 0.5, 0.05);
                camera.lookAt(playerObj.position.x * 0.2, 2, -5);

                // Police Chase Effect
                policeObj.position.x = THREE.MathUtils.lerp(policeObj.position.x, playerObj.position.x, 0.05);
                policeObj.position.z = 8 + Math.sin(Date.now() * 0.005) * 1;
            }

            renderer.render(scene, camera);
        }
        animate();

        /**
         * INTERACTION LOGIC
         */
        function startGame() {
            state.isRunning = true;
            state.score = 0;
            state.sessionCoins = 0;
            state.speed = 0.5;
            state.currentLane = 1;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            // Reset obstacles
            while(obstacleGroup.children.length > 0) obstacleGroup.remove(obstacleGroup.children[0]);
        }

        function gameOver() {
            state.isRunning = false;
            
            // Save Progress
            if(Math.floor(state.score/10) > state.highScore) {
                state.highScore = Math.floor(state.score/10);
                localStorage.setItem('anshu_highScore', state.highScore);
            }
            localStorage.setItem('anshu_coins', state.coins);

            document.getElementById('final-score').innerText = Math.floor(state.score/10);
            document.getElementById('final-coins').innerText = state.sessionCoins;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
        }

        function selectChar(id) {
            const prices = { 1: 0, 2: 500, 3: 1000 };
            
            if(state.unlocked.includes(id)) {
                state.selected = id;
                localStorage.setItem('anshu_selected', id);
                setupScene();
                updateShopUI();
            } else {
                if(state.coins >= prices[id]) {
                    state.coins -= prices[id];
                    state.unlocked.push(id);
                    state.selected = id;
                    localStorage.setItem('anshu_coins', state.coins);
                    localStorage.setItem('anshu_unlocked', JSON.stringify(state.unlocked));
                    localStorage.setItem('anshu_selected', id);
                    setupScene();
                    updateShopUI();
                    document.getElementById('total-coins-ui').innerText = state.coins;
                } else {
                    Swal.fire({ title: 'Locked!', text: 'Collect more coins!', icon: 'error', confirmButtonColor: '#007AFF' });
                }
            }
        }

        function updateShopUI() {
            [1, 2, 3].forEach(id => {
                const card = document.getElementById(`card-${id}`);
                const lock = document.getElementById(`lock-${id}`);
                card.classList.remove('selected');
                if(state.selected === id) card.classList.add('selected');
                if(state.unlocked.includes(id) && lock) lock.classList.add('hidden');
            });
        }

        // SWIPE SYSTEM
        let touchStartX = 0;
        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;

            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 40 && state.currentLane < 2) state.currentLane++;
                if(dx < -40 && state.currentLane > 0) state.currentLane--;
            } else {
                if(dy < -40 && !state.isJumping) {
                    state.isJumping = true;
                    state.yVelocity = 0.45;
                }
                if(dy > 40) {
                    // Slide Logic
                    gsap.to(playerObj.scale, { y: 0.5, duration: 0.2 });
                    gsap.to(playerObj.scale, { y: 1, duration: 0.2, delay: 0.5 });
                }
            }
        });

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' && state.currentLane > 0) state.currentLane--;
            if(e.key === 'ArrowRight' && state.currentLane < 2) state.currentLane++;
            if(e.key === 'ArrowUp' && !state.isJumping) { state.isJumping = true; state.yVelocity = 0.45; }
        });

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if(!doc.fullscreenElement) requestFullScreen.call(docEl);
            else doc.exitFullscreen();
        }

        function resetData() {
            localStorage.clear();
            location.reload();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
