<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anshu Runner | GitHub Fix</title>
    
    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #87CEEB; touch-action: none; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .clickable { pointer-events: auto; }
        .ios-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        #loading-screen { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; items-center; justify-content: center; text-align: center; }
        .btn-blue { background: #007AFF; color: white; padding: 18px 0; border-radius: 20px; font-weight: 800; width: 100%; font-size: 1.25rem; transition: transform 0.1s; }
        .btn-blue:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <h1 class="text-4xl font-black mb-2 italic">ANSHU RUNNER</h1>
        <p id="load-status" class="text-gray-400 font-bold text-sm uppercase tracking-widest">Loading Models...</p>
        <div class="w-64 h-2 bg-gray-100 rounded-full mt-6 overflow-hidden">
            <div id="load-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- START MENU -->
    <div id="menu-screen" class="fixed inset-0 z-20 flex flex-col items-center justify-between py-16 px-8 bg-white hidden">
        <div class="text-center">
            <h1 class="text-5xl font-black text-gray-900 italic leading-tight">ANSHU<br><span class="text-blue-600">RUNNER</span></h1>
            <div class="mt-4 bg-gray-100 px-4 py-1 rounded-full text-xs font-bold text-gray-500">HIGH SCORE: <span id="high-score">0</span></div>
        </div>

        <div class="w-full max-w-xs space-y-6">
            <div class="flex justify-center gap-4">
                <div class="text-2xl font-bold">🪙 <span id="menu-coins">0</span></div>
            </div>
            <button onclick="startGame()" class="clickable btn-blue shadow-lg shadow-blue-200">START GAME</button>
            <button onclick="toggleFullscreen()" class="clickable w-full text-gray-400 font-bold text-sm">📱 FULLSCREEN MODE</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="fixed top-0 left-0 w-full p-6 flex justify-between items-start z-10 hidden pointer-events-none">
        <div class="ios-card px-5 py-3">
            <p class="text-[10px] font-black text-gray-400 uppercase">Score</p>
            <p id="score-val" class="text-2xl font-black text-gray-800">0</p>
        </div>
        <div class="ios-card px-5 py-3 flex items-center gap-2">
            <span class="text-xl">🪙</span>
            <span id="coin-val" class="text-xl font-bold">0</span>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        // --- DATA & STATE ---
        let state = {
            isRunning: false,
            score: 0,
            sessionCoins: 0,
            coins: parseInt(localStorage.getItem('anshu_coins')) || 0,
            highScore: parseInt(localStorage.getItem('anshu_highScore')) || 0,
            lane: 1, // 0: Left, 1: Center, 2: Right
            speed: 0.4,
            isJumping: false,
            yVel: 0
        };

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 12);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        const worldGroup = new THREE.Group();
        const obstacleGroup = new THREE.Group();
        scene.add(worldGroup, obstacleGroup);

        // --- ASSET LOADING ---
        const manager = new THREE.LoadingManager();
        const loader = new THREE.GLTFLoader(manager);
        const models = {};

        // EXACT NAMES FROM YOUR GITHUB
        const files = [
            'player1.glb', 'player2.glb', 'player3.glb', 
            'police.glb', 'train.glb', 'Coin.glb', 
            'building1.glb', 'building2.glb', 'track.glb'
        ];

        manager.onProgress = (url, itemsLoaded, itemsTotal) => {
            let p = (itemsLoaded / itemsTotal) * 100;
            document.getElementById('load-bar').style.width = p + '%';
        };

        manager.onLoad = () => {
            setTimeout(showMenu, 500);
        };

        files.forEach(file => {
            const name = file.split('.')[0];
            loader.load(file, 
                (gltf) => { models[name] = gltf.scene; },
                undefined,
                (err) => { console.error("Error loading " + file); }
            );
        });

        // --- GAME OBJECTS ---
        let player, police;
        const tiles = [];

        function initScene() {
            // Player
            player = new THREE.Group();
            const body = models['player1'] ? models['player1'].clone() : new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color: 0x007AFF}));
            player.add(body);
            scene.add(player);

            // Police
            police = new THREE.Group();
            const pBody = models['police'] ? models['police'].clone() : new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color: 0x000000}));
            police.add(pBody);
            scene.add(police);

            // World
            for(let i=0; i<10; i++) createTile(i * -20);
        }

        function createTile(z) {
            const tile = new THREE.Group();
            
            // Track
            if(models['track']) {
                tile.add(models['track'].clone());
            } else {
                const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 20), new THREE.MeshStandardMaterial({color: 0x333333}));
                road.rotation.x = -Math.PI/2;
                tile.add(road);
            }

            // Buildings
            if(models['building1'] && Math.random() > 0.3) {
                const b1 = models['building1'].clone();
                b1.position.set(-10, 0, 0);
                tile.add(b1);
                const b2 = models['building2'].clone();
                b2.position.set(10, 0, 0);
                tile.add(b2);
            }

            tile.position.z = z;
            worldGroup.add(tile);
            tiles.push(tile);
        }

        function spawnObstacle(z) {
            const lane = [-4, 0, 4][Math.floor(Math.random()*3)];
            let obj;
            if(Math.random() > 0.4) {
                obj = models['train'] ? models['train'].clone() : new THREE.Mesh(new THREE.BoxGeometry(2, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0000}));
                obj.userData.type = 'enemy';
            } else {
                obj = models['Coin'] ? models['Coin'].clone() : new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshStandardMaterial({color: 0xffd700}));
                obj.userData.type = 'coin';
            }
            obj.position.set(lane, 0, z);
            obstacleGroup.add(obj);
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if(state.isRunning) {
                state.speed += 0.0001;
                state.score++;
                document.getElementById('score-val').innerText = Math.floor(state.score/10);

                // World Movement
                tiles.forEach(t => {
                    t.position.z += state.speed;
                    if(t.position.z > 20) {
                        t.position.z -= 200;
                        spawnObstacle(t.position.z);
                    }
                });

                // Obstacle Movement & Collision
                obstacleGroup.children.forEach(o => {
                    o.position.z += state.speed;
                    if(o.userData.type === 'coin') o.rotation.y += 0.05;

                    const dist = o.position.distanceTo(player.position);
                    if(dist < 2) {
                        if(o.userData.type === 'coin') {
                            state.sessionCoins++;
                            state.coins++;
                            document.getElementById('coin-val').innerText = state.sessionCoins;
                            obstacleGroup.remove(o);
                        } else {
                            gameOver();
                        }
                    }
                    if(o.position.z > 15) obstacleGroup.remove(o);
                });

                // Player Physics
                const targetX = [-4, 0, 4][state.lane];
                player.position.x = THREE.MathUtils.lerp(player.position.x, targetX, 0.15);

                if(state.isJumping) {
                    player.position.y += state.yVel;
                    state.yVel -= 0.02;
                    if(player.position.y <= 0) {
                        player.position.y = 0;
                        state.isJumping = false;
                    }
                }

                // Police Follow
                police.position.x = player.position.x;
                police.position.z = 6 + Math.sin(Date.now()*0.005);
                
                camera.position.x = player.position.x * 0.5;
                camera.lookAt(player.position.x, 2, -5);
            }
            renderer.render(scene, camera);
        }

        // --- LOGIC ---
        function showMenu() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('menu-coins').innerText = state.coins;
            document.getElementById('high-score').innerText = state.highScore;
            initScene();
            animate();
        }

        function startGame() {
            toggleFullscreen(); // Attempt fullscreen on start
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            state.isRunning = true;
        }

        function gameOver() {
            state.isRunning = false;
            if(Math.floor(state.score/10) > state.highScore) {
                localStorage.setItem('anshu_highScore', Math.floor(state.score/10));
            }
            localStorage.setItem('anshu_coins', state.coins);
            location.reload(); 
        }

        function toggleFullscreen() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        // Controls
        window.addEventListener('touchstart', e => { this.startT = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - this.startT.x;
            let dy = e.changedTouches[0].clientY - this.startT.y;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 40 && state.lane < 2) state.lane++;
                if(dx < -40 && state.lane > 0) state.lane--;
            } else {
                if(dy < -40 && !state.isJumping) { state.isJumping = true; state.yVel = 0.45; }
            }
        });

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' && state.lane > 0) state.lane--;
            if(e.key === 'ArrowRight' && state.lane < 2) state.lane++;
            if(e.key === 'ArrowUp' && !state.isJumping) { state.isJumping = true; state.yVel = 0.45; }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
